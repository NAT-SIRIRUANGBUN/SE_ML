name: Automated Evaluation Pipeline

on:
  push:
    branches:
      - main
      - kp
    paths:
      - 'evaluate.py'
      - '*.csv'
      - 'Categorized-Data/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pythainlp jiwer

      - name: Run Evaluation
        run: |
          python evaluate.py
